<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIRECT | ADMIN HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c; 
            --deep-black: #010101;
            --active-green: #39ff14; /* New Green Color */
            --dim-text: #888;
            --searching-gold: #ffcc00;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 30px;
        }

        .header {
            text-align: left;
            border-left: 4px solid var(--neon-red);
            padding-left: 15px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin: 0;
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 0, 60, 0.02);
            border: 1px solid rgba(255, 0, 60, 0.1);
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(255, 0, 60, 0.05);
            color: var(--neon-red);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(255, 0, 60, 0.2);
        }

        td {
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        .status-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            transition: 0.3s;
        }

        /* ONLINE GREEN STATE */
        .active-mode .status-indicator {
            background: var(--active-green);
            box-shadow: 0 0 10px var(--active-green);
        }

        .searching-mode .status-indicator {
            background: var(--searching-gold);
            box-shadow: 0 0 10px var(--searching-gold);
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--neon-red);
        }

        .battery-wrap {
            width: 100px;
            height: 12px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .battery-level {
            height: 100%;
            background: linear-gradient(90deg, #550000, var(--neon-red));
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>D.I.R.E.C.T ADMIN CONTROL</h1>
        <p style="font-size: 0.7rem; color: var(--dim-text);">SATELLITE FLEET MANAGEMENT SYSTEM</p>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>Serial No.</th>
                <th>SIM Number</th>
                <th>Tracking Target</th>
                <th>Device Battery</th>
                <th>Activation</th>
                <th>Link Status</th>
            </tr>
        </thead>
        <tbody id="device-list">
            <tr class="row-highlight">
                <td style="color: var(--dim-text);">#001</td>
                <td id="admSim">FETCHING...</td>
                <td id="admName">FETCHING...</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="battery-wrap"><div class="battery-level" id="batLevel" style="width: 0%"></div></div>
                        <span id="batText" style="font-size: 0.7rem;">0%</span>
                    </div>
                </td>
                <td>
                    <input type="checkbox" id="activateCheck" onchange="handleSignal()">
                </td>
                <td>
                    <div class="status-cell" id="statusBox">
                        <div class="status-indicator"></div>
                        <span id="statusLabel" style="color: var(--dim-text);">OFFLINE</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        window.onload = function() {
            const savedName = localStorage.getItem("childName");
            const savedSim = localStorage.getItem("trackedSim");

            document.getElementById('admName').innerText = savedName || "NO TARGET";
            document.getElementById('admSim').innerText = savedSim || "NO SIM LINKED";

            const randomBat = Math.floor(Math.random() * (95 - 60 + 1)) + 60;
            document.getElementById('batLevel').style.width = randomBat + "%";
            document.getElementById('batText').innerText = randomBat + "%";
        };

        function handleSignal() {
            const isChecked = document.getElementById('activateCheck').checked;
            const statusBox = document.getElementById('statusBox');
            const label = document.getElementById('statusLabel');

            if(isChecked) {
                statusBox.classList.remove('active-mode');
                statusBox.classList.add('searching-mode');
                label.innerText = "SEARCHING...";
                label.style.color = "var(--searching-gold)";

                setTimeout(() => {
                    if(document.getElementById('activateCheck').checked) {
                        statusBox.classList.remove('searching-mode');
                        statusBox.classList.add('active-mode');
                        label.innerText = "ONLINE";
                        label.style.color = "var(--active-green)"; // Text is now Green
                    }
                }, 1500);

            } else {
                statusBox.classList.remove('active-mode', 'searching-mode');
                label.innerText = "OFFLINE";
                label.style.color = "var(--dim-text)";
            }
        }
    </script>
</body>
</html>
