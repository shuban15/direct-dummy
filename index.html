<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIRECT | STARK LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --glow: rgba(0, 243, 255, 0.4); }
        body {
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif;
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #001a1d 0%, #000 100%);
        }
        .holo-card {
            background: rgba(0, 243, 255, 0.05);
            padding: 40px; border-radius: 20px; border: 1px solid var(--neon);
            box-shadow: 0 0 20px var(--glow), inset 0 0 10px var(--glow);
            backdrop-filter: blur(10px); width: 320px; text-align: center;
        }
        h2 { letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; color: var(--neon); opacity: 0.8; }
        input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--neon);
            color: #fff; padding: 10px 0; font-family: 'Orbitron'; outline: none;
        }
        button {
            width: 100%; padding: 15px; margin-top: 20px; cursor: pointer;
            background: var(--neon); color: #000; border: none; font-weight: bold;
            font-family: 'Orbitron'; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        button:hover { box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="holo-card">
        <h2>D.I.R.E.C.T</h2>
        <div class="input-group">
            <label>PARENT NUMBER</label>
            <input type="tel" id="parentNum" placeholder="+91XXXXXXXXXX">
        </div>
        <div class="input-group">
            <label>TRACKER SIM ID</label>
            <input type="text" id="simID" placeholder="ZORO-01">
        </div>
        <div class="input-group">
            <label>CHILD NAME</label>
            <input type="text" id="childName" placeholder="SHUBAN">
        </div>
        <button onclick="initLink()">INITIALIZE LINK</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.initLink = function() {
            const pNum = document.getElementById('parentNum').value;
            const sID = document.getElementById('simID').value;
            const cName = document.getElementById('childName').value;

            if(pNum && sID && cName) {
                localStorage.setItem("parentNum", pNum);
                localStorage.setItem("simID", sID);
                localStorage.setItem("childName", cName);

                set(ref(db, 'registry/' + sID), { parent_phone: pNum, child_name: cName })
                .then(() => window.location.href = "user.html");
            }
        }
    </script>
</body>
</html>
