<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIRECT | LOCKED PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-black: #000000;
            --danger-red: #ff3b3b;
            --disabled: #444;
        }

        html, body {
            background-color: var(--deep-black);
            margin: 0; padding: 0;
            height: 100dvh; width: 100%;
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }

        .box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .box-title {
            color: var(--neon-blue);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            gap: 5px;
        }
        .coord-label { color: var(--neon-blue); font-size: 0.6rem; display: block; }

        .split-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .needle-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pointer {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 100px solid var(--neon-blue);
            filter: drop-shadow(0 0 12px var(--neon-blue));
            transform-origin: bottom center;
            transition: transform 0.3s ease-out;
        }

        .protocol-box {
            border: 1px solid var(--disabled);
            background: rgba(255, 255, 255, 0.01);
            transition: 0.3s ease;
        }
        .protocol-box.active {
            border-color: var(--danger-red);
            background: rgba(255, 59, 59, 0.08);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .fixed-val {
            font-size: 1.5rem;
            color: var(--disabled);
            font-weight: bold;
            transition: 0.3s;
        }
        .fixed-val.active {
            color: var(--danger-red);
            text-shadow: 0 0 10px var(--danger-red);
        }

        .switch { position: relative; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="box" style="text-align: center;">
        <div class="box-title">Tracking Subject</div>
        <div id="uName" style="font-size: 1.2rem;">...</div>
    </div>

    <div class="box">
        <div class="box-title">Spatial Data (Lat, Lng, Alt)</div>
        <div class="coords-grid">
            <div class="coord-item"><span class="coord-label">LAT</span><span id="outX">0.00</span></div>
            <div class="coord-item"><span class="coord-label">LNG</span><span id="outY">0.00</span></div>
            <div class="coord-item"><span class="coord-label">ALT</span><span id="outZ">0.0m</span></div>
        </div>
    </div>

    <div class="split-row">
        <div class="box" style="margin-bottom:0;">
            <div class="box-title">Distance</div>
            <span style="font-size: 1.3rem;"><span id="displayM">0</span> m</span>
        </div>
        <div class="box" style="margin-bottom:0;">
            <div class="box-title">Steps</div>
            <span style="font-size: 1.3rem;" id="displayS">0</span>
        </div>
    </div>

    <div class="needle-area">
        <div id="ptr" class="pointer"></div>
    </div>

    <div class="box protocol-box" id="pBox">
        <div class="box-title" id="pLabel" style="color:var(--disabled)">Distance Protocol (Locked)</div>
        <div class="controls">
            <div>
                <span id="lockVal" class="fixed-val">20</span>
                <small id="pUnit" style="color:var(--disabled); margin-left:5px;">MTR</small>
            </div>
            <label class="switch">
                <input type="checkbox" id="pToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA-rK7iXlpN4I1gGqWxaYQXxt_kJUyVGGI",
        authDomain: "direct-15275.firebaseapp.com",
        databaseURL: "https://direct-15275-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "direct-15275",
        appId: "1:408729374045:web:e4f89b945de9092d182cb4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const parentID = localStorage.getItem("parentPhone");
    const needle = document.getElementById('ptr');

    // 1. UI Initialization
    document.getElementById('uName').innerText = localStorage.getItem("childName") || "TARGET_ACTIVE";

    // 2. Geolocation Watcher (PUSH Parent Coords to DB)
    if (parentID && "geolocation" in navigator) {
        navigator.geolocation.watchPosition((position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const alt = position.coords.altitude || 0;

            // Update UI with real parent coords (2 decimals as requested)
            document.getElementById('outX').innerText = lat.toFixed(2);
            document.getElementById('outY').innerText = lng.toFixed(2);
            document.getElementById('outZ').innerText = alt.toFixed(1) + "m";

            // Push to Firebase under parent's number
            set(ref(db, 'tracking/' + parentID + '/parent_live'), {
                lat: lat,
                lng: lng,
                timestamp: Date.now(),
                status: "ACTIVE"
            });

            // Point needle towards a "random" north for effect
            needle.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

        }, (error) => {
            console.error("GPS Error: " + error.message);
        }, { enableHighAccuracy: true });
    }

    // 3. Distance Protocol Toggle Logic
    document.getElementById('pToggle').addEventListener('change', (e) => {
        const isOn = e.target.checked;
        const box = document.getElementById('pBox');
        const label = document.getElementById('pLabel');
        const val = document.getElementById('lockVal');
        const unit = document.getElementById('pUnit');

        if(isOn) {
            box.classList.add('active');
            val.classList.add('active');
            label.style.color = "var(--danger-red)";
            unit.style.color = "var(--danger-red)";
            label.innerText = "Distance Protocol (ACTIVE)";
        } else {
            box.classList.remove('active');
            val.classList.remove('active');
            label.style.color = "var(--disabled)";
            unit.style.color = "var(--disabled)";
            label.innerText = "Distance Protocol (Locked)";
        }
    });

    // 4. Listen for Child Data (To update distance display)
    // This part assumes your ESP32-C3 is pushing to 'tracking/[parentID]/child_live'
    const childRef = ref(db, 'tracking/' + parentID + '/child_live');
    onValue(childRef, (snapshot) => {
        const childData = snapshot.val();
        if(childData) {
            // Logic to calculate distance between Parent and Child would go here
            // For the demo, we show the link is active
            console.log("Child data received: ", childData);
        }
    });

</script>

</body>
</html>
